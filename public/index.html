<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Todo App</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}.app{width:100%;max-width:500px;background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:40px 24px;text-align:center}.header h1{font-size:2.5em;margin-bottom:8px}.header p{opacity:.9;font-size:1em}.content{padding:30px 24px}.input-group{display:flex;gap:12px;margin-bottom:30px}#title{flex:1;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:1em;font-family:inherit;transition:border-color .2s}#title:focus{outline:0;border-color:#667eea}button{padding:12px 28px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-family:inherit;transition:transform .2s,box-shadow .2s}button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(102,126,234,.4)}button:active{transform:translateY(0)}.loading{text-align:center;color:#667eea;padding:20px;font-weight:600}#todos{list-style:none;display:flex;flex-direction:column;gap:10px}.todo{display:flex;align-items:center;gap:12px;padding:16px;background:#f8f8f8;border-radius:8px;border-left:4px solid #667eea;transition:all .2s}.todo:hover{background:#f0f0f0}.todo.completed{opacity:.6;border-left-color:#4caf50}.todo.completed .title{text-decoration:line-through;color:#999}.checkbox{width:20px;height:20px;cursor:pointer;accent-color:#667eea}.title{flex:1;font-size:1em;color:#333;word-break:break-word}.delete-btn{padding:8px 12px;background:#ff6b6b;font-size:.85em}.delete-btn:hover{box-shadow:0 4px 12px rgba(255,107,107,.4)}.empty{text-align:center;color:#999;padding:40px 20px}.error{color:#d32f2f;background:#ffebee;padding:12px;border-radius:4px;margin-bottom:16px}.count{text-align:center;color:#999;font-size:.9em;margin-top:20px;padding-top:16px;border-top:1px solid #e0e0e0}@media (max-width:600px){.header h1{font-size:2em}.input-group{flex-direction:column}button{width:100%}}</style></head><body><div class="app"><div class="header"><h1>📝 Todo</h1><p>Stay organized and productive</p></div><div class="content"><div id="error"></div><div class="input-group"><input id="title" type="text" placeholder="Add a new todo..." autocomplete="off"><button onclick="addTodo()">Add</button></div><div id="loading" class="loading" style="display:none">Loading...</div><ul id="todos"></ul><div id="empty" class="empty" style="display:none">✨ No todos yet!</div><div class="count"><span id="count">0</span> todos</div></div></div><script>const API='/api/todos';const titleInput=document.getElementById('title');const todosList=document.getElementById('todos');const emptyMsg=document.getElementById('empty');const loading=document.getElementById('loading');const errorDiv=document.getElementById('error');const countEl=document.getElementById('count');async function load(){loading.style.display='block';try{const res=await fetch(API);const data=await res.json();loading.style.display='none';if(data.success)render(data.todos)}catch(e){showError('Failed to load todos');loading.style.display='none'}}function render(todos){todosList.innerHTML='';if(!todos.length){emptyMsg.style.display='block';countEl.textContent='0';return}emptyMsg.style.display='none';countEl.textContent=todos.length;todos.forEach(todo=>{const li=document.createElement('li');li.className=`todo ${todo.completed?'completed':''}`;li.innerHTML=`<input type="checkbox" class="checkbox" ${todo.completed?'checked':''} onchange="toggle(${todo.id}, this.checked)"><span class="title">${escape(todo.title)}</span><button class="delete-btn" onclick="del(${todo.id})">Delete</button>`;todosList.appendChild(li)})}async function addTodo(){const title=titleInput.value.trim();if(!title){showError('Title is required');return}try{const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title})});const data=await res.json();if(data.success){titleInput.value='';load()}else showError(data.error)}catch(e){showError('Failed to add todo')}}async function toggle(id,completed){try{await fetch(`${API}/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({completed})});load()}catch(e){showError('Failed to update')}}async function del(id){if(!confirm('Delete this todo?'))return;try{await fetch(`${API}/${id}`,{method:'DELETE'});load()}catch(e){showError('Failed to delete')}}function showError(msg){errorDiv.innerHTML=`<div class="error">${msg}</div>`;setTimeout(()=>{errorDiv.innerHTML=''},4000)}function escape(str){const div=document.createElement('div');div.textContent=str;return div.innerHTML}titleInput.addEventListener('keypress',(e)=>{if(e.key==='Enter')addTodo()});load()</script></body></html>
